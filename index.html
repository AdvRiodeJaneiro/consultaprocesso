<!DOCTYPE html>
<html lang="pt-BR" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f8f7f6">
    <title>Advogado Rio de Janeiro | Consulta Processo - Consulta Processual</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: ["class"],
        theme: {
          extend: {
            colors: {
              primary: "#dfb82a",
              "accent-gold": "#D4AF37",
              "deep-indigo": "#1e1b4b",
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
            },
            fontFamily: {
              sans: ["'Public Sans'", "sans-serif"],
            },
          },
        },
      }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-background text-foreground h-screen overflow-hidden font-sans">
    <div id="root" class="h-full"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
